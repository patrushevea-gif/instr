<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Instr | Каталог инструментов</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <div class="mark">IN</div>
        <div>
          <p class="eyebrow">Внутренний каталог</p>
          <h1>Instr</h1>
        </div>
      </div>
      <button class="icon-button" id="densityToggle" type="button" title="Компактный режим">Aa</button>
    </header>

    <main class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <span>Разделы</span>
          <strong id="categoryCount">0</strong>
        </div>
        <nav id="categoryFilters" class="nav-list" aria-label="Разделы"></nav>
      </aside>

      <section class="main-column">
        <section class="summary">
          <div>
            <p class="eyebrow">Инструменты для работы в браузере</p>
            <h2>Каталог рабочих инструментов</h2>
          </div>
          <div class="summary-stats">
            <span><strong id="toolCount">0</strong> инструментов</span>
            <span><strong id="visibleCount">0</strong> показано</span>
          </div>
        </section>

        <section class="search-row">
          <label class="search-box" for="searchInput">
            <span>Поиск</span>
            <input id="searchInput" type="search" placeholder="PDF, CSV, договор, QR, OEE, промпт, аудит..." autocomplete="off" />
          </label>
          <button id="exportCatalog" class="secondary-button" type="button">Экспорт списка</button>
        </section>

        <section class="workbench" id="workbench">
          <div class="workbench-head">
            <div>
              <p class="eyebrow" id="activeCategory">Раздел</p>
              <h3 id="activeTitle">Выберите инструмент</h3>
            </div>
            <button id="copyResult" class="secondary-button" type="button">Копировать результат</button>
          </div>
          <p id="activeDescription" class="tool-description"></p>
          <div class="workspace-grid">
            <label class="field">
              <span id="inputLabel">Входные данные</span>
              <textarea id="toolInput" rows="11"></textarea>
            </label>
            <div class="result-card">
              <div class="params-grid" id="toolParams"></div>
              <div class="toolbar">
                <button id="runTool" type="button">Выполнить</button>
                <button id="fillTemplate" type="button">Шаблон</button>
                <button id="exportResult" type="button">CSV</button>
              </div>
              <pre id="toolOutput"></pre>
            </div>
          </div>
        </section>

        <section class="catalog-head">
          <div>
            <p class="eyebrow">Список</p>
            <h3 id="catalogTitle">Все инструменты</h3>
          </div>
        </section>
        <div class="tool-list" id="toolCatalog"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
